defaults:
  - /_layout_probe@layout_probe: per_layer
  - /_probe_train@probe_train: linear
  - sampling: random
  - _self_

model: lczerolens/maia-1100
dataset: lczerolens/tcec-boards
n_roots_train: 16
n_roots_test: 8
height: 2
max_paths_per_root: 24
max_nodes_total: 2000
branching: fixed_k
fixed_k: 4
seed: 42
probe_train:
  epochs: 5
  batch_size: 32
temp_base: 1.0
temp_end: 2.0
